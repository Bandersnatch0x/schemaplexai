name: SchemaPlexAI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security-trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif

  security-dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency-Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -pl schemaplexai-common,schemaplexai-model,schemaplexai-dao,schemaplexai-gateway,schemaplexai-system,schemaplexai-agent-engine,schemaplexai-context,schemaplexai-web,schemaplexai-integration,schemaplexai-ops,schemaplexai-quality,schemaplexai-spec,schemaplexai-task,schemaplexai-workflow -am \
            -DfailBuildOnCVSS=9
        continue-on-error: true

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: '**/target/dependency-check-report.html'

  security-gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif

  backend:
    runs-on: ubuntu-latest
    needs: [security-trivy, security-dependency-check, security-gitleaks]
    strategy:
      fail-fast: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile all modules
        run: mvn clean compile -q

      - name: Run all backend tests
        run: mvn test

      - name: Check test coverage (JaCoCo all modules)
        run: mvn jacoco:check -pl schemaplexai-common,schemaplexai-model,schemaplexai-dao,schemaplexai-gateway,schemaplexai-system,schemaplexai-agent-engine,schemaplexai-context,schemaplexai-web,schemaplexai-agent-config,schemaplexai-integration,schemaplexai-ops,schemaplexai-admin,schemaplexai-spec,schemaplexai-quality,schemaplexai-workflow,schemaplexai-task -am

      - name: Run SpotBugs analysis
        run: mvn spotbugs:check -pl schemaplexai-common,schemaplexai-model,schemaplexai-dao,schemaplexai-gateway,schemaplexai-system,schemaplexai-agent-engine -am
        continue-on-error: true

      - name: Run Checkstyle analysis
        run: mvn checkstyle:check -pl schemaplexai-common,schemaplexai-model,schemaplexai-dao,schemaplexai-gateway,schemaplexai-system,schemaplexai-agent-engine -am
        continue-on-error: true

      - name: Security-sensitive file change detection
        if: github.event_name == 'pull_request'
        run: |
          SECURITY_PATTERNS='(auth|security|jwt|token|password|crypt|oauth|session|permission|role|credential)'
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
          SECURITY_FILES=$(echo "$CHANGED_FILES" | grep -iE "$SECURITY_PATTERNS" || true)
          if [ -n "$SECURITY_FILES" ]; then
            echo "::warning::Security-sensitive files changed. Run security-reviewer agent before merge:"
            echo "$SECURITY_FILES" | while read -r f; do echo "  - $f"; done
          fi

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: '**/target/spotbugsXml.xml'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: '**/target/site/jacoco/**'

      - name: Generate JaCoCo badge
        uses: cicirello/jacoco-badge-generator@v2
        if: always()
        with:
          jacoco-csv-file: '**/target/site/jacoco/jacoco.csv'
          badges-directory: .github/badges
          generate-coverage-badge: true
          generate-branches-badge: true

  frontend:
    runs-on: ubuntu-latest
    needs: [security-trivy, security-dependency-check, security-gitleaks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: schemaplexai-ui/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd schemaplexai-ui
          npm ci

      - name: Lint frontend
        run: |
          cd schemaplexai-ui
          npm run lint

      - name: Run frontend tests
        run: |
          cd schemaplexai-ui
          npm test -- --run

      - name: Run frontend type check
        run: |
          cd schemaplexai-ui
          npx tsc --noEmit

  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: schemaplexai-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd schemaplexai-ui
          npm ci

      - name: Install Playwright browsers
        run: |
          cd schemaplexai-ui
          npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: |
          cd schemaplexai-ui
          npx playwright test e2e/smoke.spec.ts --reporter=line

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-report
          path: schemaplexai-ui/test-results/
