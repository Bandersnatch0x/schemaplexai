name: SchemaPlexAI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile
        run: mvn clean compile -pl schemaplexai-common,schemaplexai-model,schemaplexai-dao,schemaplexai-gateway,schemaplexai-system,schemaplexai-agent-engine -am -q

      - name: Run tests and verify
        run: mvn verify -pl schemaplexai-common,schemaplexai-model,schemaplexai-dao,schemaplexai-gateway,schemaplexai-system,schemaplexai-agent-engine -am

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: '**/target/site/jacoco/**'

      - name: Generate JaCoCo badge
        uses: cicirello/jacoco-badge-generator@v2
        if: always()
        with:
          jacoco-csv-file: '**/target/site/jacoco/jacoco.csv'
          badges-directory: .github/badges
          generate-coverage-badge: true
          generate-branches-badge: true
