server:
  port: 8089

spring:
  application:
    name: schemaplexai-ops
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/schemaplexai
    username: ${DB_USERNAME:sf_user}
    password: ${DB_PASSWORD:sf_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.schemaplexai.ops.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

clickhouse:
  enabled: false
  host: ${CLICKHOUSE_HOST:localhost}
  port: ${CLICKHOUSE_PORT:8123}
  database: ${CLICKHOUSE_DATABASE:schemaplexai}
  username: ${CLICKHOUSE_USERNAME:default}
  password: ${CLICKHOUSE_PASSWORD:}
  socket-timeout: 30000
  connect-timeout: 10000
  compress: true

logging:
  level:
    com.schemaplexai.ops: debug
