server:
  port: 8087

spring:
  application:
    name: schemaplexai-workflow
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/schemaplexai
    username: ${DB_USERNAME:?required}
    password: ${DB_PASSWORD:?required}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.schemaplexai.workflow.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

flowable:
  database-schema-update: true
  async-executor-activate: true
  history-level: full
  # Deployment
  deployment:
    enabled: false  # We use WorkflowDeployService for explicit deployment
  # Database
  database-schema: ${DB_SCHEMA:public}
  # IDM
  idm:
    enabled: false
  # REST
  rest:
    enabled: false

logging:
  level:
    com.schemaplexai.workflow: debug
    org.flowable: info

management:
  otlp:
    tracing:
      endpoint: http://jaeger:4318/v1/traces
      enabled: true
