server:
  port: 8084

spring:
  application:
    name: schemaplexai-agent-engine
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/schemaplexai
    username: ${DB_USERNAME:sf_user}
    password: ${DB_PASSWORD:sf_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  redis:
    host: localhost
    port: 6379
    database: 0
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:sf_user}
    password: ${RABBITMQ_PASSWORD:sf_password}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 2
        max-concurrency: 10
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.schemaplexai.agent.engine.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

agent:
  model:
    default-model: ${AGENT_DEFAULT_MODEL:}
  llm:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      timeout-seconds: ${OPENAI_TIMEOUT:60}
      max-retries: ${OPENAI_MAX_RETRIES:3}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com/v1}
      timeout-seconds: ${ANTHROPIC_TIMEOUT:60}
      max-retries: ${ANTHROPIC_MAX_RETRIES:3}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.schemaplexai.agent.engine: info
