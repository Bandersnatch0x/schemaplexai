server:
  port: 8083

spring:
  application:
    name: schemaplexai-agent-config
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/schemaplexai
    username: ${DB_USERNAME:sf_user}
    password: ${DB_PASSWORD:sf_password}
    driver-class-name: org.postgresql.Driver
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.schemaplexai.agent.config.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.schemaplexai.agent.config: info

management:
  otlp:
    tracing:
      endpoint: http://jaeger:4318/v1/traces
      enabled: true
